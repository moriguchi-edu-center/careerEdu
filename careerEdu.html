<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>キャリア教育情報ブロック</title>
  <!-- EMBED:css:START -->
<style id="overview-css-embed">
:root {
  --thumb-size: 128px;
  --col-self: #5b9bd5;
  --col-relation: #70ad47;
  --col-problem: #ffc000;
  --col-career: #ed7d31;
  --lesson-concept-bg: #f3f8fc;
  --lesson-concept-border: #6ba3c8;
  --lesson-concept-label-bg: #dceef8;
  --lesson-concept-label-text: #1e4a66;
  --lesson-concept-body: #1a3344;
  --lesson-shutoku-bg: #f4faf2;
  --lesson-shutoku-border: #6faa6a;
  --lesson-shutoku-label-bg: #e0f0dc;
  --lesson-shutoku-label-text: #2a5228;
  --lesson-shutoku-body: #1f3a1e;
  --lesson-practice-bg: #fffbf2;
  --lesson-practice-border: #c9a045;
  --lesson-practice-label-bg: #f8ecd0;
  --lesson-practice-label-text: #5c4208;
  --lesson-practice-body: #3d2e08;
  --lesson-career-bg: #faf5fc;
  --lesson-career-border: #b088c0;
  --lesson-career-label-bg: #f0e4f5;
  --lesson-career-label-text: #5c3068;
  --lesson-career-body: #331a3d;
  --tc-card-w: 320px;
  --tc-card-ratio: 5 / 7;
  --tc-art-share: 55%;
}
* { box-sizing: border-box; }
body {
  font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  background: #eee;
  margin: 0;
  padding: 16px;
  padding-bottom: 90px;
}
.file-warning {
  display: none;
  background: #fff3cd;
  border: 1px solid #ffc107;
  color: #664d03;
  padding: 12px 14px;
  border-radius: 6px;
  margin-bottom: 12px;
  font-size: 0.85rem;
  line-height: 1.5;
}
.file-warning strong { display: block; margin-bottom: 4px; }
.page-header {
  background: #fff;
  padding: 0;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  margin-bottom: 16px;
  overflow: hidden;
}
.page-header-title-wrap {
  padding: 22px 20px 18px;
  text-align: center;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
}
.page-header-banner {
  background: linear-gradient(90deg, #eef5fc 0%, #f5f0ff 50%, #fff7ed 100%);
  border-bottom: 3px solid transparent;
  border-image: linear-gradient(90deg, var(--col-self), var(--col-relation), var(--col-problem), var(--col-career)) 1;
}
.page-header-banner-img {
  display: block;
  width: 100%;
  height: auto;
}
.page-header-text {
  padding: 14px 16px;
}
.page-header h1 {
  margin: 0;
  font-family: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "UD Digi Kyokasho", "BIZ UDGothic", "M+ 1p", "Hiragino Sans", "Yu Gothic", sans-serif;
  font-size: clamp(1.6rem, 4.5vw, 2.25rem);
  font-weight: bold;
  line-height: 1.4;
  letter-spacing: 0.03em;
  color: #1e293b;
}
.page-header p { margin: 0; color: #555; font-size: 0.85rem; }
.page-header a { color: #4a90d9; }
.toolbar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px 14px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 2px 16px rgba(0,0,0,.18);
  min-width: 220px;
}
.toolbar--collapsed {
  min-width: 0;
  padding: 8px 12px;
}
.toolbar-toggle {
  padding: 8px 14px;
  font-size: 0.85rem;
  cursor: pointer;
  border: 1px solid #3a7bc8;
  border-radius: 4px;
  background: #4a90d9;
  color: #fff;
  font-weight: bold;
  width: 100%;
  text-align: left;
}
.toolbar-toggle:hover { background: #3a7bc8; }
.toolbar--collapsed .toolbar-panel { display: none; }
.toolbar-panel {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toolbar button {
  padding: 8px 14px;
  font-size: 0.85rem;
  cursor: pointer;
  border: 1px solid #3a7bc8;
  border-radius: 4px;
  background: #4a90d9;
  color: #fff;
  font-weight: bold;
}
.toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
.toolbar button:not(:disabled):hover { background: #3a7bc8; }
.toolbar button.btn-print {
  background: #fff;
  color: #3a7bc8;
  border-color: #3a7bc8;
}
.toolbar button.btn-print:not(:disabled):hover {
  background: #eef5fc;
}
.toolbar-print-mode {
  border: none;
  margin: 0;
  padding: 0;
  font-size: 0.75rem;
  color: #555;
}
.toolbar-print-mode legend {
  font-weight: bold;
  margin-bottom: 4px;
  padding: 0;
}
.toolbar-print-mode label {
  display: block;
  margin-bottom: 3px;
  cursor: pointer;
  user-select: none;
}
.toolbar-print-mode input { margin-right: 4px; vertical-align: middle; }
.toolbar-select-all {
  font-size: 0.75rem;
  color: #555;
  cursor: pointer;
  user-select: none;
}
.toolbar-select-all input { margin-right: 4px; vertical-align: middle; }
.toolbar .status { font-size: 0.75rem; color: #666; text-align: center; }
#overview {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  align-items: start;
}
.perspective-col {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  overflow: hidden;
  min-width: 0;
}
.perspective-head {
  color: #fff;
  padding: 12px 10px;
  font-size: 0.88rem;
  font-weight: bold;
  text-align: center;
  line-height: 1.4;
}
.perspective-official {
  font-size: 0.72em;
  font-weight: normal;
  opacity: 0.92;
}
.perspective-body { padding: 10px; }
.block-section { margin-bottom: 14px; }
.block-section:last-child { margin-bottom: 0; }
.block-title {
  font-size: 0.72rem;
  font-weight: bold;
  color: #444;
  background: #f5f5f5;
  padding: 5px 8px;
  border-radius: 4px;
  margin-bottom: 8px;
  line-height: 1.35;
}
.items-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.cell {
  text-align: center;
  font-size: 0.78rem;
  color: #333;
  line-height: 1.35;
}
.cell-print-label {
  display: block;
  margin-bottom: 5px;
  font-size: 0.68rem;
  color: #666;
  cursor: pointer;
  user-select: none;
}
.cell-print-label input {
  margin-right: 3px;
  vertical-align: middle;
}
.cell.is-print-selected { outline: 2px solid #4a90d9; outline-offset: 2px; border-radius: 6px; }
.cell .cell-caption { margin-bottom: 4px; }
.cell-thumb {
  display: block;
  margin: 0 auto 4px;
  padding: 0;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.15s ease, transform 0.15s ease;
}
.cell-thumb:hover { background: rgba(74, 144, 217, 0.1); }
.cell-thumb:focus-visible {
  outline: 2px solid #4a90d9;
  outline-offset: 2px;
}
.cell-thumb canvas {
  display: block;
  width: var(--thumb-size);
  height: var(--thumb-size);
  margin: 0;
  background: #fafafa;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  pointer-events: none;
}
.cell-lesson-btn {
  display: inline-block;
  margin-top: 4px;
  padding: 4px 10px;
  font-size: 0.7rem;
  font-weight: bold;
  line-height: 1.3;
  color: #3a7bc8;
  background: #eef5fc;
  border: 1px solid #b8d4f0;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.cell-lesson-btn:hover {
  background: #dceaf8;
  border-color: #4a90d9;
}
.cell-lesson-btn:focus-visible {
  outline: 2px solid #4a90d9;
  outline-offset: 1px;
}

/* study card popup (illustration + career text) */
.card-popup {
  position: fixed;
  inset: 0;
  z-index: 2100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  box-sizing: border-box;
  overflow: hidden;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.28s ease, visibility 0.28s ease;
}
.card-popup.is-open {
  opacity: 1;
  visibility: visible;
}
.card-popup-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(88, 72, 120, 0.35);
  backdrop-filter: blur(3px);
  cursor: pointer;
}
.card-popup-sheet {
  position: relative;
  width: var(--tc-card-w);
  box-sizing: border-box;
  overflow: visible;
  animation: card-pop-in 0.32s cubic-bezier(0.34, 1.4, 0.64, 1);
}
@keyframes card-pop-in {
  from { opacity: 0; transform: scale(0.94) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.card-popup-close {
  position: absolute;
  top: 6px;
  right: 6px;
  z-index: 3;
  width: 28px;
  height: 28px;
  padding: 0;
  border: 2px solid rgba(255, 255, 255, 0.55);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: none;
  font-size: 1.1rem;
  line-height: 1;
  color: #fff;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease;
}
.card-popup-close:hover {
  transform: scale(1.05);
  background: rgba(255, 255, 255, 0.32);
  color: #fff;
}
.study-card {
  font-family: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "UD Digi Kyokasho", "BIZ UDGothic", "Hiragino Sans", "Yu Gothic", sans-serif;
  --card-font-scale: 1;
  display: flex;
  flex-direction: column;
  width: var(--tc-card-w);
  aspect-ratio: var(--tc-card-ratio);
  box-sizing: border-box;
  background: linear-gradient(160deg, #fffafc 0%, #f7f4ff 48%, #f0f9ff 100%);
  border-radius: 14px;
  box-shadow:
    0 12px 32px rgba(167, 139, 250, 0.16),
    0 4px 10px rgba(244, 114, 182, 0.1);
  overflow: hidden;
  border: 3px solid var(--col-self);
  position: relative;
}
.study-card.persp-self { border-color: var(--col-self); }
.study-card.persp-relation { border-color: var(--col-relation); }
.study-card.persp-problem { border-color: var(--col-problem); }
.study-card.persp-career { border-color: var(--col-career); }
.study-card-perspective {
  flex-shrink: 0;
  margin: 0;
  padding: 9px 36px 9px 10px;
  font-size: calc(0.88rem * var(--card-font-scale));
  font-weight: bold;
  line-height: 1.35;
  text-align: center;
  color: #fff;
  letter-spacing: 0.03em;
  background: var(--col-self);
}
.study-card-perspective .perspective-official {
  font-size: 0.68em;
  font-weight: normal;
  opacity: 0.92;
}
.study-card.persp-self .study-card-perspective { background: var(--col-self); }
.study-card.persp-relation .study-card-perspective { background: var(--col-relation); }
.study-card.persp-problem .study-card-perspective { background: var(--col-problem); }
.study-card.persp-career .study-card-perspective { background: var(--col-career); }
.study-card-figure {
  margin: 0;
  flex: 0 0 var(--tc-art-share);
  min-height: 0;
  padding: 4px 8px 0;
  display: flex;
  flex-direction: column;
}
.study-card-img-wrap {
  flex: 1;
  min-height: 0;
  line-height: 0;
  border-radius: 10px;
  overflow: hidden;
  background: #fff;
  border: 2px solid rgba(196, 181, 253, 0.35);
  box-shadow: inset 0 1px 6px rgba(167, 139, 250, 0.06);
  padding: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.study-card-img,
.study-card-img-wrap img {
  display: block;
  width: 100%;
  height: 100%;
  max-height: none;
  object-fit: contain;
  border-radius: 8px;
}
.study-card-img--missing {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  min-height: 0;
  color: #a78bfa;
  font-size: 0.78rem;
  background: linear-gradient(135deg, #faf5ff, #fdf2f8);
  border-radius: 6px;
}
.study-card-body {
  flex: 1 1 0;
  min-height: 0;
  padding: calc(5px * var(--card-font-scale)) calc(10px * var(--card-font-scale)) calc(2px * var(--card-font-scale));
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.study-card-title {
  margin: 0 0 calc(5px * var(--card-font-scale));
  padding: calc(5px * var(--card-font-scale)) calc(8px * var(--card-font-scale));
  font-size: calc(1.05rem * var(--card-font-scale));
  font-weight: bold;
  line-height: 1.35;
  color: #6d28d9;
  text-align: center;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(237, 233, 254, 0.9));
  border-radius: 999px;
  border: 1px solid rgba(196, 181, 253, 0.45);
  box-shadow: 0 2px 6px rgba(167, 139, 250, 0.1);
}
.study-card.persp-self .study-card-title { color: #2563eb; border-color: rgba(147, 197, 253, 0.5); }
.study-card.persp-relation .study-card-title { color: #15803d; border-color: rgba(134, 239, 172, 0.5); }
.study-card.persp-problem .study-card-title { color: #a16207; border-color: rgba(253, 224, 71, 0.55); }
.study-card.persp-career .study-card-title { color: #c2410c; border-color: rgba(253, 186, 116, 0.55); }
.study-card-section-label {
  display: inline-block;
  margin: 0 0 5px;
  padding: 3px 9px;
  font-size: calc(0.74rem * var(--card-font-scale));
  font-weight: bold;
  color: #db2777;
  letter-spacing: 0.02em;
  background: rgba(255, 228, 240, 0.85);
  border-radius: 6px;
  border: 1px solid rgba(251, 207, 232, 0.9);
}
.study-card-text {
  margin: 0;
  padding: calc(8px * var(--card-font-scale)) calc(10px * var(--card-font-scale));
  font-size: calc(1.125rem * var(--card-font-scale));
  line-height: calc(1.15 + 0.47 * var(--card-font-scale));
  color: #374151;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
  background: rgba(255, 255, 255, 0.72);
  border-radius: 8px;
  border: 1px solid rgba(233, 213, 255, 0.65);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
}
.study-card-block {
  flex-shrink: 0;
  margin: 0;
  padding: 2px 12px 8px;
  font-size: calc(0.62rem * var(--card-font-scale));
  line-height: 1.35;
  text-align: right;
  color: #94a3b8;
  letter-spacing: 0.02em;
}

/* lesson popup */
.lesson-popup {
  position: fixed;
  inset: 0;
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}
.lesson-popup.is-open {
  opacity: 1;
  visibility: visible;
}
.lesson-popup-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  cursor: pointer;
}
.lesson-popup-content {
  position: relative;
  width: 100%;
  max-width: 760px;
  max-height: 90vh;
  overflow: auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
  border-left: 6px solid #5b9bd5;
}
.lesson-popup-content.persp-self { border-left-color: var(--col-self); }
.lesson-popup-content.persp-relation { border-left-color: var(--col-relation); }
.lesson-popup-content.persp-problem { border-left-color: var(--col-problem); }
.lesson-popup-content.persp-career { border-left-color: var(--col-career); }
.lesson-popup-close {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  z-index: 2;
  width: 40px;
  height: 40px;
  padding: 0;
  border: none;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.06);
  font-size: 1.5rem;
  line-height: 1;
  color: #475569;
  cursor: pointer;
}
.lesson-popup-close:hover {
  background: rgba(0, 0, 0, 0.1);
  color: #0f172a;
}
.lesson-popup-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  padding: 1.5rem;
  align-items: start;
}
.lesson-popup-title {
  margin: 0 0 0.5rem;
  font-size: 1.25rem;
  line-height: 1.35;
  color: #0f172a;
  font-weight: bold;
}
.lesson-popup-desc {
  margin: 0 0 0.75rem;
  font-size: 0.9rem;
  line-height: 1.6;
  color: #475569;
}
.lesson-popup-sublabel {
  margin: 0 0 0.5rem;
  font-size: 0.72rem;
  font-weight: bold;
  color: #64748b;
}
.lesson-popup-meta {
  margin: 0 0 0.85rem;
  padding: 0 0 0.65rem;
  font-size: 0.78rem;
  line-height: 1.5;
  color: #64748b;
  background: transparent;
  border: none;
  border-bottom: 1px solid #e2e8f0;
}
.lesson-popup-meta .perspective-official {
  font-size: 0.85em;
  opacity: 0.9;
}
.lesson-popup-block {
  margin-bottom: 0.75rem;
  padding: 0.65rem 0.75rem 0.7rem;
  border-radius: 8px;
  border: 1px solid transparent;
  border-left-width: 4px;
}
.lesson-block--concept {
  background: var(--lesson-concept-bg);
  border-color: rgba(107, 163, 200, 0.35);
  border-left-color: var(--lesson-concept-border);
}
.lesson-block--shutoku {
  background: var(--lesson-shutoku-bg);
  border-color: rgba(111, 170, 106, 0.35);
  border-left-color: var(--lesson-shutoku-border);
}
.lesson-block--practice {
  background: var(--lesson-practice-bg);
  border-color: rgba(201, 160, 69, 0.35);
  border-left-color: var(--lesson-practice-border);
}
.lesson-block--career {
  background: transparent;
  border: none;
  border-left: none;
  padding: 0.75rem 0 0;
  margin-top: 0.25rem;
  border-top: 1px solid #e2e8f0;
}
.lesson-popup-label {
  margin: 0 0 0.4rem;
  font-size: 0.72rem;
  font-weight: bold;
  color: #334155;
}
.lesson-block--concept .lesson-popup-label {
  display: inline-block;
  padding: 0.12rem 0.5rem;
  border-radius: 4px;
  background: var(--lesson-concept-label-bg);
  color: var(--lesson-concept-label-text);
}
.lesson-block--shutoku .lesson-popup-label {
  display: inline-block;
  padding: 0.12rem 0.5rem;
  border-radius: 4px;
  background: var(--lesson-shutoku-label-bg);
  color: var(--lesson-shutoku-label-text);
}
.lesson-block--practice .lesson-popup-label {
  display: inline-block;
  padding: 0.12rem 0.5rem;
  border-radius: 4px;
  background: var(--lesson-practice-label-bg);
  color: var(--lesson-practice-label-text);
}
.lesson-block--career .lesson-popup-label {
  display: inline-block;
  padding: 0.12rem 0.5rem;
  border-radius: 4px;
  background: #ffe4f0;
  color: #be185d;
  border: 1px solid #fbcfe8;
}
.lesson-popup-body {
  margin: 0;
  font-size: 0.86rem;
  line-height: 1.65;
  color: #1e293b;
  white-space: pre-wrap;
}
.lesson-block--concept .lesson-popup-body { color: var(--lesson-concept-body); }
.lesson-block--shutoku .lesson-popup-body { color: var(--lesson-shutoku-body); }
.lesson-block--practice .lesson-popup-body { color: var(--lesson-practice-body); }
.lesson-block--career .lesson-popup-body { color: #374151; }
.lesson-popup-image-wrap { text-align: center; }
.lesson-popup-image {
  width: 100%;
  max-width: 280px;
  height: auto;
  border-radius: 8px;
  border: 1px solid #d8e2ec;
  background: #f8fafc;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
}
.lesson-popup-career-block {
  margin-top: 0.75rem;
  margin-bottom: 0;
  text-align: left;
}
@media (max-width: 700px) {
  .lesson-popup-inner { grid-template-columns: 1fr; }
  .lesson-popup-image-wrap { order: -1; }
}
@media (max-width: 1100px) {
  #overview { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  #overview { grid-template-columns: 1fr; }
  :root { --thumb-size: 112px; }
}

/* print cards (A4) */
.print-area {
  position: fixed;
  left: 0;
  top: 0;
  width: 210mm;
  visibility: hidden;
  opacity: 0;
  z-index: -1;
  pointer-events: none;
  overflow: visible;
}
.print-area.print-area--layout {
  visibility: visible;
  opacity: 1;
}
.print-area,
.print-area * {
  -webkit-print-color-adjust: exact;

  });

  var LEGACY_TO_PERSP_KEY = {};
  PERSPECTIVE_DEFS.forEach(function(d) {
    LEGACY_TO_PERSP_KEY[d.short] = d.key;
    LEGACY_TO_PERSP_KEY[d.official] = d.key;
    d.legacy.forEach(function(label) {
      LEGACY_TO_PERSP_KEY[label] = d.key;
    });
  });

  var PERSP_CLASS = {
    self: "persp-self",
    relation: "persp-relation",
    problem: "persp-problem",
    career: "persp-career"
  };

  function resolvePerspectiveKey(name) {
    if (!name) return "";
    if (LEGACY_TO_PERSP_KEY[name]) return LEGACY_TO_PERSP_KEY[name];
    return "";
  }

  function getPerspectiveDef(nameOrKey) {
    var key = resolvePerspectiveKey(nameOrKey);
    if (!key && PERSP_CLASS[nameOrKey]) key = nameOrKey;
    for (var i = 0; i < PERSPECTIVE_DEFS.length; i++) {
      if (PERSPECTIVE_DEFS[i].key === key) return PERSPECTIVE_DEFS[i];
    }
    return null;
  }

  function getPerspectiveShortLabel(nameOrKey) {
    var def = getPerspectiveDef(nameOrKey);
    if (def) return def.short;

  function parseCategory(category) {

    if (!m) {

    return {

      perspectiveKey: resolvePerspectiveKey(m[1]),

      blockTitle: m[3]

  }

  function groupData(items) {
    var map = {};

      map[d.key] = { blocks: [], blockMap: {} };
    });
    items.forEach(function(item) {
      var parsed = parseCategory(item.category);
      var col = map[parsed.perspectiveKey];
      if (!col) return;
      var blockKey = parsed.blockId + parsed.blockTitle;
      if (!col.blockMap[blockKey]) {
        col.blockMap[blockKey] = {
          blockId: parsed.blockId,
          blockTitle: parsed.blockTitle,
          items: []
        };
        col.blocks.push(col.blockMap[blockKey]);
      }
      col.blockMap[blockKey].items.push(item);
    });
    return map;
  }

  function renderLabeledCanvas(img, item, settings) {
    var label = settings.label || item.label;
    var fontSize = parseInt(settings.fontSize, 10) || DEFAULT_FONT_SIZE;
    var left = parseInt(settings.left, 10) || DEFAULT_LABEL_LEFT;
    var top = parseInt(settings.top, 10) || DEFAULT_LABEL_TOP;
    var maxWidth = parseFloat(settings.maxWidth) || DEFAULT_MAX_WIDTH;

    var c = document.createElement("canvas");
    c.width = img.naturalWidth;
    c.height = img.naturalHeight;
    var ctx = c.getContext("2d");
    ctx.drawImage(img, 0, 0);

    var scale = img.naturalWidth / INDEX_DISPLAY_SIZE;
    var actualFontSize = Math.round(fontSize * scale);
    ctx.font = "bold " + actualFontSize + "px " + FONT_FAMILY;
    ctx.fillStyle = "#000";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = Math.max(2, Math.round(actualFontSize / 12));
    ctx.textBaseline = "top";
    ctx.textAlign = "left";

    var lines = label.split("\n");
    var lineHeight = actualFontSize * 1.4;
    var scaledLeft = left * scale;
    var scaledTop = top * scale;
    var scaledMaxWidth = (INDEX_DISPLAY_SIZE * maxWidth / 100) * scale;
    var currentY = scaledTop;

    lines.forEach(function(line) {
      if (line.trim() === "") {
        currentY += lineHeight;
        return;
      }
      var currentLine = "";
      for (var i = 0; i < line.length; i++) {
        var char = line[i];
        var testLine = currentLine + char;
        if (ctx.measureText(testLine).width > scaledMaxWidth && currentLine.length > 0) {
          ctx.strokeText(currentLine, scaledLeft, currentY);
          ctx.fillText(currentLine, scaledLeft, currentY);
          currentLine = char;
          currentY += lineHeight;
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine) {
        ctx.strokeText(currentLine, scaledLeft, currentY);
        ctx.fillText(currentLine, scaledLeft, currentY);
        currentY += lineHeight;
      }
    });

    return c;
  }

  function elementOverflows(el) {
    if (!el) return false;
    return el.scrollHeight > el.clientHeight + 1;

  function studyCardOverflows(card) {
    if (!card) return false;
    var cardRect = card.getBoundingClientRect();
    var blockEl = card.querySelector(".study-card-block");
    var careerEl = card.querySelector(".study-card-text");
    if (blockEl) {
      var blockRect = blockEl.getBoundingClientRect();
      if (blockRect.bottom > cardRect.bottom + 1) return true;
    }
    if (careerEl) {
      var textRect = careerEl.getBoundingClientRect();
      if (textRect.bottom > cardRect.bottom + 1) return true;
    }
    var body = card.querySelector(".study-card-body");
    if (elementOverflows(body)) return true;
    return elementOverflows(card);
  }

  function setCardFontScale(card, scale) {
    if (!card) return;
    scale = Math.max(CARD_FONT_SCALE_MIN, Math.min(1, scale));
    card.style.setProperty("--card-font-scale", scale.toFixed(3));
    void card.offsetHeight;
  }

  function shrinkCardFontsUntilFit(card) {
    if (!studyCardOverflows(card)) {
      setCardFontScale(card, 1);
      return 1;
    }
    var lo = CARD_FONT_SCALE_MIN;
    var hi = 1;
    var best = CARD_FONT_SCALE_MIN;
    for (var i = 0; i < 14; i++) {
      var mid = (lo + hi) / 2;
      setCardFontScale(card, mid);
      if (studyCardOverflows(card)) {
        hi = mid;
      } else {
        best = mid;
        lo = mid;
      }
    }
    setCardFontScale(card, best);
    return best;
  }

    setCardArtShare(card, 50);

  function fitStudyCardSize() {
    if (!cardPopupCard) return;
    resetStudyCardSize();
    var pad = 24;
    var maxW = Math.floor(Math.min(window.innerWidth - pad, (window.innerHeight - pad) * 5 / 7));
    maxW = Math.max(maxW, TC_MIN_WIDTH);

    setCardSize(cardPopupCard, maxW, cardPopupSheet);
    shrinkCardLayoutUntilFit(cardPopupCard);
    if (!studyCardOverflows(cardPopupCard)) return;

    var w = maxW;
    while (studyCardOverflows(cardPopupCard) && w < 960) {
      w += 16;
      setCardSize(cardPopupCard, w, cardPopupSheet);
      shrinkCardLayoutUntilFit(cardPopupCard);
    }
    var finalW = cardPopupCard.offsetWidth;
    var finalH = cardPopupCard.offsetHeight;
    var scale = Math.min(
      1,
      (window.innerWidth - pad) / finalW,
      (window.innerHeight - pad) / finalH
    );
    if (cardPopupSheet && scale < 0.999) {
      cardPopupSheet.style.transform = "scale(" + scale + ")";
    }
  }

    var cardH = w * TC_HEIGHT_RATIO;

      w = Math.floor(h / TC_HEIGHT_RATIO);
    }
    setCardSize(card, w);
    shrinkCardLayoutUntilFit(card);
  }

  function lessonPrintSheetOverflows(sheet) {
    if (!sheet) return false;
    if (sheet.scrollHeight > sheet.clientHeight + 1) return true;
    var inner = sheet.querySelector(".print-lesson-inner");
    if (inner && inner.scrollHeight > inner.clientHeight + 1) return true;
    var blocks = sheet.querySelectorAll(".lesson-popup-block");
    for (var i = 0; i < blocks.length; i++) {
      if (blocks[i].scrollHeight > blocks[i].clientHeight + 1) return true;
      var body = blocks[i].querySelector(".lesson-popup-body");
      if (body && body.scrollHeight > body.clientHeight + 1) return true;
    }
    return false;
  }

  function allLessonPrintSheetsFit() {

      function done(success) {
        if (settled) return;
        settled = true;
        container.innerHTML = "";
        if (success) {

        } else {
          var missing = document.createElement("div");

          missing.textContent = "\u753b\u50cf\u304c\u3042\u308a\u307e\u305b\u3093";

        resolve();

  async function runPrint(items) {
    var mode = getPrintMode();
    var emptyMsg = mode === "lesson"
      ? "\u5370\u5237\u3059\u308b\u5b66\u7fd2\u6848\u3092\u9078\u3093\u3067\u304f\u3060\u3055\u3044\u3002"
      : "\u5370\u5237\u3059\u308b\u30ab\u30fc\u30c9\u3092\u9078\u3093\u3067\u304f\u3060\u3055\u3044\u3002";
    if (!items.length) {
      alert(emptyMsg);
      return;
    }
    if (isPrinting) return;
    isPrinting = true;
    if (statusEl) {
      statusEl.textContent = mode === "lesson" ? "\u5b66\u7fd2\u6848\u5370\u5237\u6e96\u5099\u4e2d\u2026" : "\u30ab\u30fc\u30c9\u5370\u5237\u6e96\u5099\u4e2d\u2026";
    }
    try {
      await buildPrintArea(items, mode);
      if (printAreaEl) printAreaEl.classList.add("print-area--layout");
      await waitForPrintLayout();
      if (mode === "card") fitAllPrintCards();
      await new Promise(function(resolve) {
        var done = false;
        function finish() {
          if (done) return;
          done = true;
          clearPrintArea();
          if (statusEl) statusEl.textContent = "";
          isPrinting = false;
          resolve();
        }
        window.addEventListener("afterprint", finish, { once: true });
        setTimeout(function() { window.print(); }, 50);
        setTimeout(finish, 60000);
      });
    } catch (e) {
      clearPrintArea();
      if (statusEl) statusEl.textContent = "";
      isPrinting = false;
      alert(e.message || "\u5370\u5237\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002");
    }
  }

  function downloadBlob(blob, filename) {
    return new Promise(function(resolve, reject) {
      if (!blob) {
        reject(new Error("\u753b\u50cf\u30c7\u30fc\u30bf\u3092\u751f\u6210\u3067\u304d\u307e\u305b\u3093\u3067\u3057\u305f\u3002"));
        return;
      }
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); resolve(); }, 500);
    });
  }

  function measureColumn(grouped, perspectiveKey) {
    var COL_W = 360;
    var HEADER_H = 64;
    var BLOCK_TITLE_H = 24;
    var THUMB = 100;
    var CELL_H = 118;
    var BLOCK_GAP = 12;
    var y = HEADER_H;
    grouped[perspectiveKey].blocks.forEach(function(block) {
      y += BLOCK_TITLE_H;
      var rows = Math.ceil(block.items.length / 2);
      y += rows * CELL_H + BLOCK_GAP;
    });
    return y + 16;
  }

  function fillPerspectiveHeader(ctx, short, official, centerX, topY, maxWidth) {
    ctx.textAlign = "center";
    ctx.font = "bold 13px sans-serif";
    if (!official) {
      ctx.fillText(short, centerX, topY + 8);
      return;
    }
    var officialText = "\uff08" + official + "\uff09";
    ctx.font = "10px sans-serif";
    var officialW = ctx.measureText(officialText).width;
    ctx.font = "bold 13px sans-serif";
    var shortW = ctx.measureText(short).width;
    if (shortW + officialW <= maxWidth) {
      var x = centerX - (shortW + officialW) / 2;
      ctx.textAlign = "left";
      ctx.fillText(short, x, topY + 8);
      ctx.font = "10px sans-serif";
      ctx.fillText(officialText, x + shortW, topY + 8);
      return;
    }
    ctx.textAlign = "center";
    ctx.font = "bold 13px sans-serif";
    ctx.fillText(short, centerX, topY);
    ctx.font = "10px sans-serif";
    ctx.fillText(officialText, centerX, topY + 14);
  }

  async function exportOverviewPng() {
    assertCanExport();
    var grouped = groupData(window.CAREER_DATA);
    var COL_W = 360;
    var GAP = 12;
    var PAD = 20;
    var HEADER_H = 64;
    var BLOCK_TITLE_H = 24;
    var THUMB = 100;
    var CELL_H = 118;
    var BLOCK_GAP = 12;
    var colors = ["#5b9bd5", "#70ad47", "#ffc000", "#ed7d31"];
    var heights = PERSPECTIVES.map(function(p) { return measureColumn(grouped, p.key); });
    var totalH = Math.max.apply(null, heights) + PAD * 2 + 60;
    var totalW = PAD * 2 + COL_W * 4 + GAP * 3;

    var canvas = document.createElement("canvas");
    canvas.width = totalW;
    canvas.height = totalH;
    var ctx = canvas.getContext("2d");
    ctx.fillStyle = "#eeeeee";
    ctx.fillRect(0, 0, totalW, totalH);

    ctx.fillStyle = "#333";
    ctx.font = "bold 22px " + FONT_FAMILY.replace(/"/g, "");
    ctx.textAlign = "center";
    ctx.fillText("\u30ad\u30e3\u30ea\u30a2\u6559\u80b2 \u5b66\u7fd2\u5185\u5bb9\u30a4\u30e9\u30b9\u30c8 \u4e00\u89a7\u8868\uff084\u8996\u70b9\uff09", totalW / 2, PAD + 18);

    for (var pi = 0; pi < PERSPECTIVES.length; pi++) {
      var p = PERSPECTIVES[pi];
      var x0 = PAD + pi * (COL_W + GAP);
      var y = PAD + 40;

      ctx.fillStyle = colors[pi];
      ctx.fillRect(x0, y, COL_W, HEADER_H);
      ctx.fillStyle = "#fff";
      fillPerspectiveHeader(ctx, p.short, p.official, x0 + COL_W / 2, y + 14, COL_W - 16);
      y += HEADER_H;

      ctx.fillStyle = "#fff";
      ctx.fillRect(x0, y, COL_W, heights[pi] - HEADER_H - 40);

      for (var bi = 0; bi < grouped[p.key].blocks.length; bi++) {
        var block = grouped[p.key].blocks[bi];
        ctx.fillStyle = "#f5f5f5";
        ctx.fillRect(x0 + 8, y + 4, COL_W - 16, BLOCK_TITLE_H);
        ctx.fillStyle = "#444";
        ctx.font = "bold 11px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("\u30d6\u30ed\u30c3\u30af" + block.blockId + "\u300c" + block.blockTitle + "\u300d", x0 + 14, y + 20);
        y += BLOCK_TITLE_H;

        for (var ii = 0; ii < block.items.length; ii++) {
          var item = block.items[ii];
          var col = ii % 2;
          var row = Math.floor(ii / 2);
          var cx = x0 + 10 + col * ((COL_W - 20) / 2);
          var cy = y + row * CELL_H;

          try {
            var img = await loadImage(careerImgSrc(item.file));
            ctx.drawImage(img, cx, cy, THUMB, THUMB);
          } catch (e) {
            ctx.fillStyle = "#e8e8e8";
            ctx.fillRect(cx, cy, THUMB, THUMB);
          }

          ctx.strokeStyle = "#ddd";
          ctx.strokeRect(cx, cy, THUMB, THUMB);
          ctx.fillStyle = "#333";
          ctx.font = "10px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(item.label, cx + THUMB / 2, cy + THUMB + 14);
        }
        var rows = Math.ceil(block.items.length / 2);
        y += rows * CELL_H + BLOCK_GAP;
      }
    }

    return new Promise(function(resolve, reject) {
      try {
        canvas.toBlob(function(blob) {
          if (!blob) {
            reject(new Error("serve.bat \u304b\u3089 http://localhost:8765/ \u3067\u958b\u304d\u76f4\u3057\u3066\u304f\u3060\u3055\u3044\u3002"));
            return;
          }
          downloadBlob(blob, "career_illust_overview.png").then(resolve).catch(reject);
        }, "image/png");
      } catch (e) {
        reject(new Error("PNG\u66f8\u304d\u51fa\u3057\u306b\u306f serve.bat \u304c\u5fc5\u8981\u3067\u3059\u3002"));
      }
    });
  }

  function applyLessonsData(data) {
    if (!data || !data.lessons) return null;
    data.lessons.forEach(function(lesson) {
      lessonsByRow[lesson.row] = lesson;
    });
    return data;
  }

  var JSON_SCRIPT_IDS = {
    data: "career-data-json",
    lessons: "career-lessons-json"
  };
  var JSON_PATHS = {
    data: "career-data.json",
    lessons: "career-lessons.json"
  };

  function parseJsonText(text) {
    if (!text || !String(text).trim()) return null;
    try {
      return JSON.parse(text);
    } catch (e) {
      return null;
    }
  }

  function loadJsonViaXhr(path) {
    if (!path) return null;
    try {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", path, false);
      xhr.overrideMimeType("application/json;charset=utf-8");
      xhr.send(null);
      if (xhr.responseText) {
        return parseJsonText(xhr.responseText);
      }
    } catch (e) {}
    return null;
  }

  function loadJsonViaFetch(path) {
    return fetch(path)
      .then(function(res) {
        if (!res.ok) throw new Error(path);
        return res.json();
      })
      .catch(function() {
        return null;
      });
  }

  function waitForJsonScript(id, path) {
    return new Promise(function(resolve) {
      var el = document.getElementById(id);
      function finish(data) {
        resolve(data || null);
      }
      function tryElement() {
        return parseJsonText(el && el.textContent);
      }
      if (el) {
        var immediate = tryElement();
        if (immediate) {
          finish(immediate);
          return;
        }
        el.addEventListener("load", function() {
          finish(tryElement() || loadJsonViaXhr(path));
        });
        el.addEventListener("error", function() {
          finish(loadJsonViaXhr(path));
        });
        setTimeout(function() {
          finish(tryElement() || loadJsonViaXhr(path));
        }, 120);
        return;
      }
      if (location.protocol === "file:") {
        finish(loadJsonViaXhr(path));
        return;
      }
      loadJsonViaFetch(path).then(finish);
    });
  }

  function loadJsonFromScript(id) {
    var el = document.getElementById(id);
    return parseJsonText(el && el.textContent);
  }

  function loadCareerData() {
    if (window.CAREER_DATA && window.CAREER_DATA.length) {
      return Promise.resolve(window.CAREER_DATA);
    }
    var inline = loadJsonFromScript(JSON_SCRIPT_IDS.data);
    if (Array.isArray(inline) && inline.length) {
      window.CAREER_DATA = inline;
      return Promise.resolve(inline);
    }
    return waitForJsonScript(JSON_SCRIPT_IDS.data, JSON_PATHS.data).then(function(data) {
      if (Array.isArray(data) && data.length) {
        window.CAREER_DATA = data;
        return data;
      }
      return null;
    });
  }

  function loadLessons() {
    if (window.CAREER_LESSONS) {
      return Promise.resolve(applyLessonsData(window.CAREER_LESSONS));
    }
    var inline = loadJsonFromScript(JSON_SCRIPT_IDS.lessons);
    if (inline) {
      return Promise.resolve(applyLessonsData(inline));
    }
    return waitForJsonScript(JSON_SCRIPT_IDS.lessons, JSON_PATHS.lessons).then(function(data) {
      return applyLessonsData(data);
    });
  }

  function initOverview() {
    Promise.all([loadCareerData(), loadLessons()]).then(function(results) {
      var data = results[0];
      if (!data || !data.length) {
        if (overviewEl) {
          overviewEl.innerHTML =
            "<p style=\"padding:16px;color:#c00;\">データが読み込めません。career-data.json と career-lessons.json を確認してください。</p>";
        }
        return;
      }
      buildOverview();
      updatePrintSelectionUI();
    });
  }

  initOverview();
})();
</script>
