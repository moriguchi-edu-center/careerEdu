<!DOCTYPE html>
<html lang="ja">
<head>

  <title>キャリア教育情報ブロック</title>
  <!-- EMBED:css:START -->
<style id="overview-css-embed">
:root {

  --tc-card-ratio: 5 / 7;

}
* { box-sizing: border-box; }
body {

}

}

.page-header {
  background: #fff;

}

}

}
.page-header-banner-img {
  display: block;

}
.page-header-text {
  padding: 14px 16px;
}

}
.page-header p { margin: 0; color: #555; font-size: 0.85rem; }
.page-header a { color: #4a90d9; }
.toolbar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;

}

}

  display: flex;

}
.toolbar button {
  padding: 8px 14px;
  font-size: 0.85rem;

  border: 1px solid #3a7bc8;

}

.toolbar button.btn-print {
  background: #fff;

}

}
.toolbar-print-mode {
  border: none;
  margin: 0;
  padding: 0;

}
.toolbar-print-mode legend {
  font-weight: bold;
  margin-bottom: 4px;
  padding: 0;
}
.toolbar-print-mode label {
  display: block;
  margin-bottom: 3px;
  cursor: pointer;
  user-select: none;
}
.toolbar-print-mode input { margin-right: 4px; vertical-align: middle; }
.toolbar-select-all {
  font-size: 0.75rem;
  color: #555;
  cursor: pointer;
  user-select: none;
}
.toolbar-select-all input { margin-right: 4px; vertical-align: middle; }
.toolbar .status { font-size: 0.75rem; color: #666; text-align: center; }
#overview {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  align-items: start;
}
.perspective-col {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  overflow: hidden;
  min-width: 0;
}
.perspective-head {
  color: #fff;
  padding: 12px 10px;
  font-size: 0.88rem;
  font-weight: bold;
  text-align: center;
  line-height: 1.4;
}
.perspective-official {
  font-size: 0.72em;
  font-weight: normal;
  opacity: 0.92;
}
.perspective-body { padding: 10px; }
.block-section { margin-bottom: 14px; }
.block-section:last-child { margin-bottom: 0; }
.block-title {
  font-size: 0.72rem;
  font-weight: bold;
  color: #444;
  background: #f5f5f5;
  padding: 5px 8px;
  border-radius: 4px;
  margin-bottom: 8px;
  line-height: 1.35;
}
.items-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.cell {
  text-align: center;
  font-size: 0.78rem;
  color: #333;
  line-height: 1.35;
}
.cell-print-label {
  display: block;
  margin-bottom: 5px;
  font-size: 0.68rem;
  color: #666;
  cursor: pointer;
  user-select: none;
}
.cell-print-label input {
  margin-right: 3px;
  vertical-align: middle;
}
.cell.is-print-selected { outline: 2px solid #4a90d9; outline-offset: 2px; border-radius: 6px; }
.cell .cell-caption { margin-bottom: 4px; }
.cell-thumb {
  display: block;
  margin: 0 auto 4px;
  padding: 0;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.15s ease, transform 0.15s ease;
}
.cell-thumb:hover { background: rgba(74, 144, 217, 0.1); }
.cell-thumb:focus-visible {
  outline: 2px solid #4a90d9;

}
.cell-thumb canvas {
  display: block;
  width: var(--thumb-size);
  height: var(--thumb-size);

  background: #fafafa;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  pointer-events: none;
}
.cell-lesson-btn {
  display: inline-block;
  margin-top: 4px;
  padding: 4px 10px;
  font-size: 0.7rem;
  font-weight: bold;
  line-height: 1.3;
  color: #3a7bc8;
  background: #eef5fc;
  border: 1px solid #b8d4f0;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.cell-lesson-btn:hover {
  background: #dceaf8;
  border-color: #4a90d9;
}
.cell-lesson-btn:focus-visible {
  outline: 2px solid #4a90d9;
  outline-offset: 1px;
}

/* study card popup (illustration + career text) */
.card-popup {
  position: fixed;
  inset: 0;
  z-index: 2100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  box-sizing: border-box;
  overflow: hidden;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.28s ease, visibility 0.28s ease;
}
.card-popup.is-open {
  opacity: 1;
  visibility: visible;
}
.card-popup-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(88, 72, 120, 0.35);
  backdrop-filter: blur(3px);
  cursor: pointer;
}
.card-popup-sheet {
  position: relative;
  width: var(--tc-card-w);
  box-sizing: border-box;
  overflow: visible;
  animation: card-pop-in 0.32s cubic-bezier(0.34, 1.4, 0.64, 1);
}
@keyframes card-pop-in {
  from { opacity: 0; transform: scale(0.94) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.card-popup-close {
  position: absolute;
  top: 6px;
  right: 6px;
  z-index: 3;
  width: 28px;
  height: 28px;
  padding: 0;
  border: 2px solid rgba(255, 255, 255, 0.55);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: none;
  font-size: 1.1rem;
  line-height: 1;
  color: #fff;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease;
}
.card-popup-close:hover {
  transform: scale(1.05);
  background: rgba(255, 255, 255, 0.32);
  color: #fff;
}
.study-card {
  font-family: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "UD Digi Kyokasho", "BIZ UDGothic", "Hiragino Sans", "Yu Gothic", sans-serif;
  --card-font-scale: 1;
  display: flex;
  flex-direction: column;
  width: var(--tc-card-w);
  aspect-ratio: var(--tc-card-ratio);
  box-sizing: border-box;
  background: linear-gradient(160deg, #fffafc 0%, #f7f4ff 48%, #f0f9ff 100%);
  border-radius: 14px;
  box-shadow:
    0 12px 32px rgba(167, 139, 250, 0.16),
    0 4px 10px rgba(244, 114, 182, 0.1);
  overflow: hidden;
  border: 3px solid var(--col-self);
  position: relative;
}
.study-card.persp-self { border-color: var(--col-self); }
.study-card.persp-relation { border-color: var(--col-relation); }
.study-card.persp-problem { border-color: var(--col-problem); }
.study-card.persp-career { border-color: var(--col-career); }
.study-card-perspective {
  flex-shrink: 0;
  margin: 0;
  padding: 9px 36px 9px 10px;
  font-size: calc(0.88rem * var(--card-font-scale));
  font-weight: bold;
  line-height: 1.35;
  text-align: center;
  color: #fff;
  letter-spacing: 0.03em;
  background: var(--col-self);
}
.study-card-perspective .perspective-official {
  font-size: 0.68em;
  font-weight: normal;
  opacity: 0.92;
}
.study-card.persp-self .study-card-perspective { background: var(--col-self); }
.study-card.persp-relation .study-card-perspective { background: var(--col-relation); }
.study-card.persp-problem .study-card-perspective { background: var(--col-problem); }
.study-card.persp-career .study-card-perspective { background: var(--col-career); }
.study-card-figure {
  margin: 0;
  flex: 0 0 var(--tc-art-share);
  min-height: 0;
  padding: 4px 8px 0;
  display: flex;
  flex-direction: column;
}
.study-card-img-wrap {
  flex: 1;
  min-height: 0;
  line-height: 0;
  border-radius: 10px;
  overflow: hidden;
  background: #fff;
  border: 2px solid rgba(196, 181, 253, 0.35);
  box-shadow: inset 0 1px 6px rgba(167, 139, 250, 0.06);
  padding: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.study-card-img,
.study-card-img-wrap img {
  display: block;
  width: 100%;
  height: 100%;
  max-height: none;
  object-fit: contain;
  border-radius: 8px;
}
.study-card-img--missing {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  min-height: 0;
  color: #a78bfa;
  font-size: 0.78rem;
  background: linear-gradient(135deg, #faf5ff, #fdf2f8);
  border-radius: 6px;
}
.study-card-body {
  flex: 1 1 0;
  min-height: 0;
  padding: calc(5px * var(--card-font-scale)) calc(10px * var(--card-font-scale)) calc(2px * var(--card-font-scale));
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.study-card-title {
  margin: 0 0 calc(5px * var(--card-font-scale));
  padding: calc(5px * var(--card-font-scale)) calc(8px * var(--card-font-scale));
  font-size: calc(1.05rem * var(--card-font-scale));
  font-weight: bold;
  line-height: 1.35;
  color: #6d28d9;
  text-align: center;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(237, 233, 254, 0.9));
  border-radius: 999px;
  border: 1px solid rgba(196, 181, 253, 0.45);
  box-shadow: 0 2px 6px rgba(167, 139, 250, 0.1);
}
.study-card.persp-self .study-card-title { color: #2563eb; border-color: rgba(147, 197, 253, 0.5); }
.study-card.persp-relation .study-card-title { color: #15803d; border-color: rgba(134, 239, 172, 0.5); }
.study-card.persp-problem .study-card-title { color: #a16207; border-color: rgba(253, 224, 71, 0.55); }
.study-card.persp-career .study-card-title { color: #c2410c; border-color: rgba(253, 186, 116, 0.55); }
.study-card-section-label {
  display: inline-block;
  margin: 0 0 5px;
  padding: 3px 9px;
  font-size: calc(0.74rem * var(--card-font-scale));
  font-weight: bold;
  color: #db2777;
  letter-spacing: 0.02em;
  background: rgba(255, 228, 240, 0.85);
  border-radius: 6px;
  border: 1px solid rgba(251, 207, 232, 0.9);
}
.study-card-text {
  margin: 0;
  padding: calc(8px * var(--card-font-scale)) calc(10px * var(--card-font-scale));
  font-size: calc(1.125rem * var(--card-font-scale));
  line-height: calc(1.15 + 0.47 * var(--card-font-scale));
  color: #374151;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
  background: rgba(255, 255, 255, 0.72);
  border-radius: 8px;
  border: 1px solid rgba(233, 213, 255, 0.65);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
}
.study-card-block {
  flex-shrink: 0;
  margin: 0;
  padding: 2px 12px 8px;
  font-size: calc(0.62rem * var(--card-font-scale));
  line-height: 1.35;
  text-align: right;
  color: #94a3b8;
  letter-spacing: 0.02em;
}

/* lesson popup */
.lesson-popup {
  position: fixed;
  inset: 0;
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}
.lesson-popup.is-open {
  opacity: 1;
  visibility: visible;
}
.lesson-popup-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  cursor: pointer;
}
.lesson-popup-content {
  position: relative;
  width: 100%;
  max-width: 760px;
  max-height: 90vh;
  overflow: auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
  border-left: 6px solid #5b9bd5;

.lesson-popup-content.persp-self { border-left-color: var(--col-self); }
.lesson-popup-content.persp-relation { border-left-color: var(--col-relation); }
.lesson-popup-content.persp-problem { border-left-color: var(--col-problem); }
.lesson-popup-content.persp-career { border-left-color: var(--col-career); }
.lesson-popup-close {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  z-index: 2;
  width: 40px;
  height: 40px;
  padding: 0;
  border: none;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.06);
  font-size: 1.5rem;
  line-height: 1;
  color: #475569;
  cursor: pointer;
}
.lesson-popup-close:hover {
  background: rgba(0, 0, 0, 0.1);
  color: #0f172a;
}
.lesson-popup-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  padding: 1.5rem;
  align-items: start;
}
.lesson-popup-title {
  margin: 0 0 0.5rem;
  font-size: 1.25rem;
  line-height: 1.35;
  color: #0f172a;
}
.lesson-popup-desc {
  margin: 0 0 0.75rem;
  font-size: 0.9rem;
  line-height: 1.6;
  color: #475569;
}
.lesson-popup-sublabel {
  margin: 0 0 0.5rem;
  font-size: 0.72rem;
  font-weight: bold;
  color: #64748b;
}
.lesson-popup-meta {
  margin: 0 0 0.75rem;
  font-size: 0.78rem;
  line-height: 1.5;
  color: #64748b;
}
.lesson-popup-meta .perspective-official {
  font-size: 0.85em;
  opacity: 0.9;
}
.lesson-popup-block {
  margin-bottom: 0.75rem;
  padding-left: 0.75rem;
  border-left: 3px solid #e2e8f0;
}
.lesson-popup-label {
  margin: 0 0 0.35rem;
  font-size: 0.72rem;
  font-weight: bold;
  color: #334155;
}
.lesson-popup-body {
  margin: 0;
  font-size: 0.82rem;
  line-height: 1.65;
  color: #1e293b;
  white-space: pre-wrap;
}
.lesson-popup-image-wrap { text-align: center; }
.lesson-popup-image {
  width: 100%;
  max-width: 280px;
  height: auto;
  border-radius: 8px;
  border: 1px solid #e2e8f0;

}
.lesson-popup-career-block {
  margin-top: 0.75rem;
  margin-bottom: 0;
  text-align: left;
}
@media (max-width: 700px) {
  .lesson-popup-inner { grid-template-columns: 1fr; }
  .lesson-popup-image-wrap { order: -1; }
}
@media (max-width: 1100px) {
  #overview { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  #overview { grid-template-columns: 1fr; }
  :root { --thumb-size: 112px; }
}

/* print cards (A4) */
.print-area {
  position: fixed;
  left: 0;
  top: 0;
  width: 210mm;
  visibility: hidden;
  opacity: 0;
  z-index: -1;
  pointer-events: none;
  overflow: visible;
}
.print-area.print-area--layout {
  visibility: visible;
  opacity: 1;
}
.print-area,
.print-area * {
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.print-area--card {
  width: 190mm;
}
.print-page {
  page-break-after: always;
  break-after: page;
}
.print-area--card .print-page {
  width: 190mm;
  height: 277mm;
  max-height: 277mm;
  overflow: hidden;
  box-sizing: border-box;
}
.print-page:last-child {
  page-break-after: auto;
  break-after: auto;
}
.print-grid {
  display: grid;
  grid-template-columns: repeat(3, calc((190mm - 8mm) / 3));
  grid-template-rows: repeat(3, calc((277mm - 8mm) / 3));
  gap: 4mm;
  width: 190mm;
  height: 277mm;
  box-sizing: border-box;
  align-content: start;
}
.print-card-slot {
  width: 100%;
  height: 100%;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  aspect-ratio: auto;
  display: flex;
  align-items: center;
  justify-content: center;
}
.print-study-card {
  width: 100%;
  height: 100%;
  max-width: 100%;
  max-height: 100%;
  aspect-ratio: auto;
  --card-font-scale: 1;
  box-shadow: none;
  border-width: 2px;
  border-radius: 8px;
  break-inside: avoid;
  page-break-inside: avoid;
  overflow: hidden;
  background: #fff !important;
}
.print-study-card .study-card-text {

}
.print-study-card .study-card-block {

}
.print-area--lesson .lesson-popup-body,
.print-area--lesson .lesson-popup-label,
.print-area--lesson .lesson-popup-title,
.print-area--lesson .lesson-popup-meta {
  color: #1e293b !important;
}
.print-study-card.persp-self { border-color: #5b9bd5 !important; }
.print-study-card.persp-relation { border-color: #70ad47 !important; }
.print-study-card.persp-problem { border-color: #ffc000 !important; }
.print-study-card.persp-career { border-color: #ed7d31 !important; }
.print-study-card .study-card-perspective {
  padding: 6px 8px;
  color: #fff !important;
}
.print-study-card .study-card-perspective .perspective-official {
  font-size: 0.68em;
  font-weight: normal;
  opacity: 0.92;
}
.print-study-card.persp-self .study-card-perspective { background: #5b9bd5 !important; }
.print-study-card.persp-relation .study-card-perspective { background: #70ad47 !important; }
.print-study-card.persp-problem .study-card-perspective { background: #ffc000 !important; color: #333 !important; }
.print-study-card.persp-career .study-card-perspective { background: #ed7d31 !important; }
.print-study-card.persp-self .study-card-title { color: #2563eb !important; border-color: #93c5fd !important; }
.print-study-card.persp-relation .study-card-title { color: #15803d !important; border-color: #86efac !important; }
.print-study-card.persp-problem .study-card-title { color: #a16207 !important; border-color: #fde047 !important; }

/* print lesson plans (A4, two per page) */

  page-break-after: always;

  function resolvePerspectiveKey(name) {
    if (!name) return "";
    if (LEGACY_TO_PERSP_KEY[name]) return LEGACY_TO_PERSP_KEY[name];
    return "";
  }

  function getPerspectiveDef(nameOrKey) {
    var key = resolvePerspectiveKey(nameOrKey);
    if (!key && PERSP_CLASS[nameOrKey]) key = nameOrKey;
    for (var i = 0; i < PERSPECTIVE_DEFS.length; i++) {
      if (PERSPECTIVE_DEFS[i].key === key) return PERSPECTIVE_DEFS[i];
    }
    return null;
  }

  function getPerspectiveShortLabel(nameOrKey) {
    var def = getPerspectiveDef(nameOrKey);
    if (def) return def.short;
    return nameOrKey || "";
  }

  function getPerspectiveOfficialLabel(nameOrKey) {
    var def = getPerspectiveDef(nameOrKey);
    if (def) return def.official;
    return "";
  }

  function getPerspectiveLabel(nameOrKey) {
    var short = getPerspectiveShortLabel(nameOrKey);

  function assertCanExport() {
    if (location.protocol === "file:") {
      throw new Error("PNG\u66f8\u304d\u51fa\u3057\u306b\u306f\u30ed\u30fc\u30ab\u30eb\u30b5\u30fc\u30d0\u30fc\u304c\u5fc5\u8981\u3067\u3059\u3002\n\n\u30d5\u30a9\u30eb\u30c0\u5185\u306e serve.bat \u3092\u30c0\u30d6\u30eb\u30af\u30ea\u30c3\u30af\u3057\u3001\u958b\u3044\u305f\u30da\u30fc\u30b8\u304b\u3089\u66f8\u304d\u51fa\u3057\u3066\u304f\u3060\u3055\u3044\u3002");

  function getSettings(file) {
    var defaults = {
      label: null,
      fontSize: DEFAULT_FONT_SIZE,
      left: DEFAULT_LABEL_LEFT,
      top: DEFAULT_LABEL_TOP,
      maxWidth: DEFAULT_MAX_WIDTH
    };
    try {
      var raw = localStorage.getItem("illust_" + file);
      if (raw) {
        var parsed = JSON.parse(raw);
        for (var k in parsed) {
          if (Object.prototype.hasOwnProperty.call(parsed, k)) defaults[k] = parsed[k];
        }
      }
    } catch (e) {}
    return defaults;
  }

  function parseCategory(category) {
    var m = category.match(/^(.+?)\s*\/\s*\u60c5\u5831\u30d6\u30ed\u30c3\u30af([A-P])\u300c(.+?)\u300d/);
    if (!m) {
      return {
        perspective: getPerspectiveLabel(category),
        legacyPerspective: category,
        perspectiveKey: resolvePerspectiveKey(category),
        blockId: "",
        blockTitle: ""
      };
    }
    return {
      perspective: getPerspectiveLabel(m[1]),
      legacyPerspective: m[1],
      perspectiveKey: resolvePerspectiveKey(m[1]),
      blockId: m[2],
      blockTitle: m[3]
    };
  }

  function groupData(items) {
    var map = {};
    PERSPECTIVE_DEFS.forEach(function(d) {
      map[d.key] = { blocks: [], blockMap: {} };
    });
    items.forEach(function(item) {
      var parsed = parseCategory(item.category);
      var col = map[parsed.perspectiveKey];
      if (!col) return;
      var blockKey = parsed.blockId + parsed.blockTitle;
      if (!col.blockMap[blockKey]) {
        col.blockMap[blockKey] = {
          blockId: parsed.blockId,
          blockTitle: parsed.blockTitle,
          items: []
        };
        col.blocks.push(col.blockMap[blockKey]);
      }
      col.blockMap[blockKey].items.push(item);
    });
    return map;
  }

  function renderLabeledCanvas(img, item, settings) {
    var label = settings.label || item.label;
    var fontSize = parseInt(settings.fontSize, 10) || DEFAULT_FONT_SIZE;
    var left = parseInt(settings.left, 10) || DEFAULT_LABEL_LEFT;
    var top = parseInt(settings.top, 10) || DEFAULT_LABEL_TOP;
    var maxWidth = parseFloat(settings.maxWidth) || DEFAULT_MAX_WIDTH;

    var c = document.createElement("canvas");
    c.width = img.naturalWidth;
    c.height = img.naturalHeight;
    var ctx = c.getContext("2d");
    ctx.drawImage(img, 0, 0);

    var scale = img.naturalWidth / INDEX_DISPLAY_SIZE;
    var actualFontSize = Math.round(fontSize * scale);
    ctx.font = "bold " + actualFontSize + "px " + FONT_FAMILY;
    ctx.fillStyle = "#000";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = Math.max(2, Math.round(actualFontSize / 12));
    ctx.textBaseline = "top";
    ctx.textAlign = "left";

    var lines = label.split("\n");
    var lineHeight = actualFontSize * 1.4;
    var scaledLeft = left * scale;
    var scaledTop = top * scale;
    var scaledMaxWidth = (INDEX_DISPLAY_SIZE * maxWidth / 100) * scale;
    var currentY = scaledTop;

    lines.forEach(function(line) {
      if (line.trim() === "") {
        currentY += lineHeight;
        return;
      }
      var currentLine = "";
      for (var i = 0; i < line.length; i++) {
        var char = line[i];
        var testLine = currentLine + char;
        if (ctx.measureText(testLine).width > scaledMaxWidth && currentLine.length > 0) {
          ctx.strokeText(currentLine, scaledLeft, currentY);
          ctx.fillText(currentLine, scaledLeft, currentY);
          currentLine = char;
          currentY += lineHeight;
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine) {
        ctx.strokeText(currentLine, scaledLeft, currentY);
        ctx.fillText(currentLine, scaledLeft, currentY);
        currentY += lineHeight;
      }
    });

    return c;
  }

    img.onload = function() {

    };
    img.onerror = function() {

    }
    thumbBtn.addEventListener("click", openItemCard);
    lessonBtn.addEventListener("click", openItemLesson);
    printCheck.addEventListener("change", updatePrintSelectionUI);

    return cell;
  }

  function extractPracticeFromPlan(text, unitType) {
    if (!text) return "";
    var m = text.match(/\u3010\u5b9f\u8df5\uff1a[^\u3011]+\u3011\s*([\s\S]*)$/);
    return m ? m[1].trim() : text;
  }

  function extractShutokuFromPlan(text) {
    if (!text) return "";
    var m = text.match(/\u3010\u7fd2\u5f97\u3011\s*([\s\S]*?)\u3010\u5b9f\u8df5\uff1a/);
    return m ? m[1].trim() : text;
  }

  function resetStudyCardSize() {
    if (!cardPopupCard) return;
    cardPopupCard.style.width = "";
    cardPopupCard.style.height = "";
    cardPopupCard.style.setProperty("--card-font-scale", "1");
    cardPopupCard.style.removeProperty("--tc-art-share");
    if (cardPopupSheet) {
      cardPopupSheet.style.width = "";
      cardPopupSheet.style.transform = "";
    }
  }

  function elementOverflows(el) {
    if (!el) return false;
    return el.scrollHeight > el.clientHeight + 1;
  }

  function studyCardOverflows(card) {
    if (!card) return false;
    var cardRect = card.getBoundingClientRect();
    var blockEl = card.querySelector(".study-card-block");
    var careerEl = card.querySelector(".study-card-text");
    if (blockEl) {
      var blockRect = blockEl.getBoundingClientRect();
      if (blockRect.bottom > cardRect.bottom + 1) return true;
    }
    if (careerEl) {
      var textRect = careerEl.getBoundingClientRect();
      if (textRect.bottom > cardRect.bottom + 1) return true;
    }
    var body = card.querySelector(".study-card-body");
    if (elementOverflows(body)) return true;
    return elementOverflows(card);
  }

  function setCardFontScale(card, scale) {
    if (!card) return;
    scale = Math.max(CARD_FONT_SCALE_MIN, Math.min(1, scale));
    card.style.setProperty("--card-font-scale", scale.toFixed(3));
    void card.offsetHeight;
  }

  function shrinkCardFontsUntilFit(card) {
    if (!studyCardOverflows(card)) {
      setCardFontScale(card, 1);
      return 1;
    }
    var lo = CARD_FONT_SCALE_MIN;
    var hi = 1;
    var best = CARD_FONT_SCALE_MIN;
    for (var i = 0; i < 14; i++) {
      var mid = (lo + hi) / 2;
      setCardFontScale(card, mid);
      if (studyCardOverflows(card)) {
        hi = mid;
      } else {
        best = mid;
        lo = mid;
      }
    }
    setCardFontScale(card, best);
    return best;
  }

  function setCardSize(card, w, sheet) {
    if (!card) return;
    w = Math.round(w);
    card.style.width = w + "px";
    card.style.height = Math.round(w * TC_HEIGHT_RATIO) + "px";
    if (sheet) sheet.style.width = w + "px";
    void card.offsetHeight;
  }

  function setCardArtShare(card, pct) {
    if (!card) return;
    card.style.setProperty("--tc-art-share", pct + "%");
    void card.offsetHeight;
  }

  function resetCardLayout(card) {
    if (!card) return;
    card.style.width = "";
    card.style.height = "";
    card.style.setProperty("--card-font-scale", "1");
    card.style.removeProperty("--tc-art-share");
  }

  function shrinkCardLayoutUntilFit(card) {
    if (!card) return 1;
    setCardArtShare(card, 55);
    var scale = shrinkCardFontsUntilFit(card);
    if (!studyCardOverflows(card)) return scale;
    setCardArtShare(card, 50);
    return shrinkCardFontsUntilFit(card);
  }

  function fitStudyCardSize() {
    if (!cardPopupCard) return;
    resetStudyCardSize();
    var pad = 24;
    var maxW = Math.floor(Math.min(window.innerWidth - pad, (window.innerHeight - pad) * 5 / 7));
    maxW = Math.max(maxW, TC_MIN_WIDTH);

    setCardSize(cardPopupCard, maxW, cardPopupSheet);
    shrinkCardLayoutUntilFit(cardPopupCard);
    if (!studyCardOverflows(cardPopupCard)) return;

    var w = maxW;
    while (studyCardOverflows(cardPopupCard) && w < 960) {
      w += 16;
      setCardSize(cardPopupCard, w, cardPopupSheet);
      shrinkCardLayoutUntilFit(cardPopupCard);
    }
    var finalW = cardPopupCard.offsetWidth;
    var finalH = cardPopupCard.offsetHeight;
    var scale = Math.min(
      1,
      (window.innerWidth - pad) / finalW,
      (window.innerHeight - pad) / finalH
    );
    if (cardPopupSheet && scale < 0.999) {
      cardPopupSheet.style.transform = "scale(" + scale + ")";
    }
  }

  function scheduleFitStudyCardSize() {
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        fitStudyCardSize();
        requestAnimationFrame(fitStudyCardSize);
      });
    });
  }

  function getCardMeta(lesson, item) {
    var parsed = parseCategory(item.category || "");
    var rawPersp = lesson.perspective || parsed.legacyPerspective || "";
    var blockId = lesson.blockId || parsed.blockId || "";
    var blockTitle = lesson.blockTitle || parsed.blockTitle || "";
    var blockLabel = blockTitle
      ? "\u30d6\u30ed\u30c3\u30af" + blockId + "\u300c" + blockTitle + "\u300d"
      : "";
    return {
      rawPersp: rawPersp,
      perspClass: getPerspClass(rawPersp),
      blockLabel: blockLabel
    };
  }

  function buildStudyCardElement(lesson, item, forPrint) {
    var meta = getCardMeta(lesson, item);

    var sectionLabel = document.createElement("p");
    sectionLabel.className = "study-card-section-label";
    sectionLabel.textContent = "\u2728 \u5c06\u6765\u306e\u30ad\u30e3\u30ea\u30a2\u3068\u306e\u3064\u306a\u304c\u308a";

  function loadStudyCardImage(imgWrap, lesson, item) {
    return new Promise(function(resolve) {
      var img = new Image();
      var settled = false;
      function done(success) {
        if (settled) return;
        settled = true;
        imgWrap.innerHTML = "";
        if (success) {
          imgWrap.appendChild(img);
        } else {
          imgWrap.innerHTML = '<div class="study-card-img study-card-img--missing">\u753b\u50cf\u304c\u3042\u308a\u307e\u305b\u3093</div>';
        }
        resolve();
      }
      img.alt = lesson.title || item.label;
      img.className = "study-card-img";
      img.onload = function() { done(true); };
      img.onerror = function() { done(false); };
      img.src = lesson.image || careerImgSrc(item.file);
    });
  }

  function getOrderedItems(filterFn) {
    var grouped = groupData(window.CAREER_DATA);
    var items = [];
    PERSPECTIVES.forEach(function(p) {
      grouped[p.key].blocks.forEach(function(block) {
        block.items.forEach(function(item) {
          if (!filterFn || filterFn(item)) items.push(item);
        });
      });
    });
    return items;
  }

  function getPrintCheckboxes() {
    return Array.prototype.slice.call(document.querySelectorAll(".cell-print-check"));
  }

  function getSelectedPrintItems() {
    var selectedRows = {};
    getPrintCheckboxes().forEach(function(cb) {
      if (cb.checked) selectedRows[cb.dataset.row] = true;
    });
    return getOrderedItems(function(item) {
      return !!selectedRows[String(item.row)];
    });
  }

  function updatePrintSelectionUI() {
    var boxes = getPrintCheckboxes();
    var selectedCount = boxes.filter(function(cb) { return cb.checked; }).length;
    if (btnPrintSelected) {
      btnPrintSelected.disabled = selectedCount === 0;
      btnPrintSelected.textContent = "\u9078\u629e\u3057\u3066\u5370\u5237\uff08" + selectedCount + "\u4ef6\uff09";
    }
    if (printSelectAll) {
      printSelectAll.checked = boxes.length > 0 && selectedCount === boxes.length;
      printSelectAll.indeterminate = selectedCount > 0 && selectedCount < boxes.length;
    }
    boxes.forEach(function(cb) {
      var cell = cb.closest(".cell");
      if (cell) cell.classList.toggle("is-print-selected", cb.checked);
    });
  }

  function chunkItems(items, size) {
    var chunks = [];
    for (var i = 0; i < items.length; i += size) {
      chunks.push(items.slice(i, i + size));
    }
    return chunks;
  }

  function fitPrintCardInSlot(card, slot) {
    if (!card || !slot) return;
    resetCardLayout(card);
    var w = slot.clientWidth;
    var h = slot.clientHeight;
    if (w < 1) w = 228;
    if (h < 1) h = Math.round(w * TC_HEIGHT_RATIO);
    var cardH = w * TC_HEIGHT_RATIO;
    if (cardH > h) {
      w = Math.floor(h / TC_HEIGHT_RATIO);
    }
    setCardSize(card, w);
    shrinkCardLayoutUntilFit(card);
  }

  function fitAllPrintCards() {
    if (!printAreaEl) return;
    var slots = printAreaEl.querySelectorAll(".print-card-slot");
    for (var i = 0; i < slots.length; i++) {
      fitPrintCardInSlot(slots[i].querySelector(".study-card"), slots[i]);
    }
  }

  function waitForPrintLayout() {
    return new Promise(function(resolve) {
      if (printAreaEl) printAreaEl.classList.add("print-area--layout");
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          resolve();
        });
      });
    });
  }

  function getPrintMode() {
    var checked = document.querySelector('input[name="print-mode"]:checked');
    return checked && checked.value === "lesson" ? "lesson" : "card";
  }

  function getLessonForItem(item) {
    var lesson = lessonsByRow[item.row];

    var parsed = parseCategory(item.category || "");
    return {
      title: item.label,
      description: item.desc || "",
      career_relevance: "",
      perspective: parsed.perspective,
      blockId: parsed.blockId,
      blockTitle: parsed.blockTitle,
      unitType: "",
      duration: "",
      shutoku_plan: "",

    };

  function appendLessonPopupBlock(parent, label, text, extraClass) {
    var block = document.createElement("div");
    block.className = "lesson-popup-block" + (extraClass ? " " + extraClass : "");
    var labelEl = document.createElement("p");
    labelEl.className = "lesson-popup-label";

    var bodyEl = document.createElement("p");
    bodyEl.className = "lesson-popup-body";

  function loadLessonPopupImage(container, lesson, item) {
    return new Promise(function(resolve) {
      var settled = false;
      var img = document.createElement("img");
      function done(success) {
        if (settled) return;
        settled = true;
        container.innerHTML = "";
        if (success) {
          container.appendChild(img);
        } else {
          var missing = document.createElement("div");
          missing.className = "lesson-popup-image lesson-popup-image--missing";
          missing.textContent = "\u753b\u50cf\u304c\u3042\u308a\u307e\u305b\u3093";
          container.appendChild(missing);
        }
        resolve();
      }
      img.className = "lesson-popup-image";
      img.alt = lesson.title || item.label;
      img.onload = function() { done(true); };
      img.onerror = function() { done(false); };
      img.src = lesson.image || careerImgSrc(item.file);
    });

  function buildLessonPrintSheet(lesson, item) {
    var parsed = parseCategory(item.category || "");
    var rawPersp = lesson.perspective || parsed.legacyPerspective || "";
    var sheet = document.createElement("article");
    sheet.className = "print-lesson-sheet lesson-popup-content " + getPerspClass(rawPersp);

    var inner = document.createElement("div");
    inner.className = "lesson-popup-inner print-lesson-inner";

    var textCol = document.createElement("div");
    textCol.className = "lesson-popup-text";

    textCol.appendChild(titleEl);
    textCol.appendChild(metaEl);
    appendLessonPopupBlock(
      textCol,

    );
    appendLessonPopupBlock(
      textCol,
      "\u7fd2\u5f9715\u5206\uff1a\u5fc5\u8981\u6027\u3092\u77e5\u308b",

    );
    appendLessonPopupBlock(
      textCol,
      "\u5b9f\u8df530\u5206\uff1a" + (lesson.unitType || ""),

    );

    var imageCol = document.createElement("div");
    imageCol.className = "lesson-popup-image-wrap";
    var imgHost = document.createElement("div");
    imgHost.className = "print-lesson-img-host";
    imageCol.appendChild(imgHost);
    appendLessonPopupBlock(
      imageCol,
      "\u5c06\u6765\u306e\u30ad\u30e3\u30ea\u30a2\u3068\u306e\u3064\u306a\u304c\u308a",
      lesson.career_relevance || "",
      "lesson-popup-career-block"
    );

    inner.appendChild(textCol);
    inner.appendChild(imageCol);
    sheet.appendChild(inner);

    return { sheet: sheet, imgHost: imgHost, lesson: lesson, item: item };
  }

  async function buildCardPrintArea(items) {
    if (!printAreaEl) return;
    printAreaEl.className = "print-area print-area--card";
    printAreaEl.innerHTML = "";
    var pages = chunkItems(items, PRINT_CARDS_PER_PAGE);
    for (var pi = 0; pi < pages.length; pi++) {
      var pageEl = document.createElement("div");
      pageEl.className = "print-page";
      var grid = document.createElement("div");
      grid.className = "print-grid";
      var loadTasks = [];
      pages[pi].forEach(function(item) {
        var lesson = getLessonForItem(item);
        var built = buildStudyCardElement(lesson, item, true);
        var slot = document.createElement("div");
        slot.className = "print-card-slot";
        slot.appendChild(built.article);
        grid.appendChild(slot);
        loadTasks.push(loadStudyCardImage(built.imgWrap, lesson, item));
      });
      await Promise.all(loadTasks);
      pageEl.appendChild(grid);
      printAreaEl.appendChild(pageEl);
    }
    await waitForPrintLayout();
    fitAllPrintCards();
    await waitForPrintLayout();
    printAreaEl.setAttribute("aria-hidden", "false");
  }

  async function buildLessonPrintArea(items) {
    if (!printAreaEl) return;
    printAreaEl.className = "print-area print-area--lesson";
    printAreaEl.innerHTML = "";
    var pages = chunkItems(items, PRINT_LESSONS_PER_PAGE);
    var loadTasks = [];
    for (var pi = 0; pi < pages.length; pi++) {
      var a4Sheet = document.createElement("div");
      a4Sheet.className = "print-a4-sheet";
      pages[pi].forEach(function(item) {
        var lesson = getLessonForItem(item);
        var built = buildLessonPrintSheet(lesson, item);
        a4Sheet.appendChild(built.sheet);
        loadTasks.push(loadLessonPopupImage(built.imgHost, built.lesson, built.item));
      });
      printAreaEl.appendChild(a4Sheet);
    }
    await Promise.all(loadTasks);
    await waitForPrintLayout();
    printAreaEl.setAttribute("aria-hidden", "false");
  }

  async function buildPrintArea(items, mode) {
    if (mode === "lesson") {
      await buildLessonPrintArea(items);
    } else {
      await buildCardPrintArea(items);
    }
  }

  function clearPrintArea() {
    if (!printAreaEl) return;
    printAreaEl.innerHTML = "";
    printAreaEl.className = "print-area";
    printAreaEl.classList.remove("print-area--layout");
    printAreaEl.setAttribute("aria-hidden", "true");
  }

  async function runPrint(items) {
    var mode = getPrintMode();
    var emptyMsg = mode === "lesson"
      ? "\u5370\u5237\u3059\u308b\u5b66\u7fd2\u6848\u3092\u9078\u3093\u3067\u304f\u3060\u3055\u3044\u3002"
      : "\u5370\u5237\u3059\u308b\u30ab\u30fc\u30c9\u3092\u9078\u3093\u3067\u304f\u3060\u3055\u3044\u3002";
    if (!items.length) {
      alert(emptyMsg);
      return;
    }
    if (isPrinting) return;
    isPrinting = true;
    if (statusEl) {
      statusEl.textContent = mode === "lesson" ? "\u5b66\u7fd2\u6848\u5370\u5237\u6e96\u5099\u4e2d\u2026" : "\u30ab\u30fc\u30c9\u5370\u5237\u6e96\u5099\u4e2d\u2026";
    }
    try {
      await buildPrintArea(items, mode);
      if (printAreaEl) printAreaEl.classList.add("print-area--layout");
      await waitForPrintLayout();
      if (mode === "card") fitAllPrintCards();
      await new Promise(function(resolve) {
        var done = false;
        function finish() {
          if (done) return;
          done = true;
          clearPrintArea();
          if (statusEl) statusEl.textContent = "";
          isPrinting = false;
          resolve();
        }
        window.addEventListener("afterprint", finish, { once: true });
        setTimeout(function() { window.print(); }, 50);
        setTimeout(finish, 60000);
      });
    } catch (e) {
      clearPrintArea();
      if (statusEl) statusEl.textContent = "";
      isPrinting = false;
      alert(e.message || "\u5370\u5237\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002");
    }
  }

  function fillMeta(el, lesson) {
    if (!el) return;
    el.textContent = "";
    fillPerspectiveLabel(el, lesson.perspective || "");
    el.appendChild(document.createTextNode(
      " / \u60c5\u5831\u30d6\u30ed\u30c3\u30af" + (lesson.blockId || "") + "\u300c" + (lesson.blockTitle || "") + "\u300d" +
      " \u30fb " + (lesson.unitType || "") + " \u30fb " + (lesson.duration || "")
    ));
  }

  function openCardPopup(lesson, item) {
    if (!cardPopupEl) return;
    closeLessonPopup();
    var meta = getCardMeta(lesson, item);
    cardPopupTitle.textContent = lesson.title || item.label;
    if (cardPopupPerspective) {
      fillPerspectiveLabel(cardPopupPerspective, meta.rawPersp);
    }
    if (cardPopupBlock) {
      cardPopupBlock.textContent = meta.blockLabel;
    }
    var careerText = lesson.career_relevance || "";
    if (!careerText && lessonsByRow[item.row]) {
      careerText = lessonsByRow[item.row].career_relevance || "";
    }
    cardPopupCareer.textContent = careerText;
    if (cardPopupCard) {
      cardPopupCard.className = "study-card " + (meta.perspClass || "");
    }
    if (cardPopupImgWrap) {
      cardPopupImgWrap.innerHTML = "";
      loadStudyCardImage(cardPopupImgWrap, lesson, item).then(function() {
        scheduleFitStudyCardSize();
      });
    } else {
      scheduleFitStudyCardSize();
    }
    cardPopupEl.classList.add("is-open");
    cardPopupEl.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
    document.documentElement.style.overflow = "hidden";
    if (cardPopupClose) cardPopupClose.focus();
  }

  function closeCardPopup() {
    if (!cardPopupEl) return;
    cardPopupEl.classList.remove("is-open");
    cardPopupEl.setAttribute("aria-hidden", "true");
    resetStudyCardSize();
    document.body.style.overflow = "";
    document.documentElement.style.overflow = "";
  }

  function openLessonPopup(lesson, item) {
    if (!popupEl) return;
    closeCardPopup();
    popupTitle.textContent = lesson.title || item.label;
    if (popupConceptLabel) {
      popupConceptLabel.textContent = "\u5b66\u7fd2\u5185\u5bb9\uff08\u6982\u5ff5\uff09";
    }
    popupDesc.textContent = lesson.description || item.desc || "";
    fillMeta(popupMeta, lesson);
    popupCareerLabel.textContent = "\u5c06\u6765\u306e\u30ad\u30e3\u30ea\u30a2\u3068\u306e\u3064\u306a\u304c\u308a";
    popupCareer.textContent = lesson.career_relevance || "";
    popupShutokuLabel.textContent = "\u7fd2\u5f9715\u5206\uff1a\u5fc5\u8981\u6027\u3092\u77e5\u308b";
    popupShutoku.textContent =
      lesson.shutoku_plan ||
      extractShutokuFromPlan(lesson.lesson_plan || "");
    popupPracticeLabel.textContent =
      "\u5b9f\u8df530\u5206\uff1a" + (lesson.unitType || "");
    popupPractice.textContent =
      lesson.practice_plan ||
      extractPracticeFromPlan(lesson.lesson_plan || "", lesson.unitType);
    popupImage.src = lesson.image || careerImgSrc(item.file);
    popupImage.alt = lesson.title || item.label;
    if (popupContent) {
      popupContent.className = "lesson-popup-content " + getPerspClass(lesson.perspective || "");
    }
    popupEl.classList.add("is-open");
    popupEl.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
    if (popupClose) popupClose.focus();
  }

  function closeLessonPopup() {
    if (!popupEl) return;
    popupEl.classList.remove("is-open");
    popupEl.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }

  if (cardPopupBackdrop) cardPopupBackdrop.addEventListener("click", closeCardPopup);
  if (cardPopupClose) cardPopupClose.addEventListener("click", closeCardPopup);
  if (popupBackdrop) popupBackdrop.addEventListener("click", closeLessonPopup);
  if (popupClose) popupClose.addEventListener("click", closeLessonPopup);
  document.addEventListener("keydown", function(e) {
    if (e.key !== "Escape") return;
    if (cardPopupEl && cardPopupEl.classList.contains("is-open")) {
      closeCardPopup();
    } else if (popupEl && popupEl.classList.contains("is-open")) {
      closeLessonPopup();
    }
  });

  function buildOverview() {
    var grouped = groupData(window.CAREER_DATA);
    PERSPECTIVES.forEach(function(p) {
      var col = document.createElement("section");
      col.className = "perspective-col";

      var head = document.createElement("div");
      head.className = "perspective-head";
      head.style.background = p.color;
      fillPerspectiveLabel(head, p.key);

      var body = document.createElement("div");
      body.className = "perspective-body";

      grouped[p.key].blocks.forEach(function(block) {
        var section = document.createElement("div");
        section.className = "block-section";

        var title = document.createElement("div");
        title.className = "block-title";
        title.textContent = "\u30d6\u30ed\u30c3\u30af" + block.blockId + "\u300c" + block.blockTitle + "\u300d";

        var grid = document.createElement("div");
        grid.className = "items-grid";
        block.items.forEach(function(item) {
          grid.appendChild(makeCell(item));
        });

        section.appendChild(title);
        section.appendChild(grid);
        body.appendChild(section);
      });

      col.appendChild(head);
      col.appendChild(body);
      overviewEl.appendChild(col);
    });
  }

  btnExport.addEventListener("click", function() {
    if (!window.CAREER_DATA || !window.CAREER_DATA.length) {
      alert("\u30c7\u30fc\u30bf\u306e\u8aad\u307f\u8fbc\u307f\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002");
      return;
    }
    btnExport.disabled = true;
    statusEl.textContent = "\u751f\u6210\u4e2d\u2026";
    exportOverviewPng().then(function() {
      statusEl.textContent = "\u66f8\u304d\u51fa\u3057\u5b8c\u4e86";
      btnExport.disabled = false;
    }).catch(function(e) {
      statusEl.textContent = "\u5931\u6557";
      alert(e.message || "\u66f8\u304d\u51fa\u3057\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002");
      btnExport.disabled = false;
    });
  });

  if (btnPrintAll) {
    btnPrintAll.addEventListener("click", function() {
      runPrint(getOrderedItems());
    });
  }
  if (btnPrintSelected) {
    btnPrintSelected.addEventListener("click", function() {
      runPrint(getSelectedPrintItems());
    });
  }
  if (printSelectAll) {
    printSelectAll.addEventListener("change", function() {
      var checked = printSelectAll.checked;
      getPrintCheckboxes().forEach(function(cb) {
        cb.checked = checked;
      });
      updatePrintSelectionUI();
    });
  }
  if (toolbarToggle && toolbarEl) {
    toolbarToggle.addEventListener("click", function() {
      var collapsed = toolbarEl.classList.toggle("toolbar--collapsed");
      toolbarToggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
      toolbarToggle.textContent = collapsed ? "\u5370\u5237\u30fb\u66f8\u304d\u51fa\u3057" : "\u9589\u3058\u308b";
    });
  }

  function loadImage(src) {
    return new Promise(function(resolve, reject) {
      var img = new Image();
      img.onload = function() { resolve(img); };
      img.onerror = function() { reject(new Error(src)); };
      img.src = src;
    });
  }

  function downloadBlob(blob, filename) {
    return new Promise(function(resolve, reject) {
      if (!blob) {
        reject(new Error("\u753b\u50cf\u30c7\u30fc\u30bf\u3092\u751f\u6210\u3067\u304d\u307e\u305b\u3093\u3067\u3057\u305f\u3002"));
        return;
      }
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); resolve(); }, 500);
    });
  }

  function measureColumn(grouped, perspectiveKey) {
    var COL_W = 360;
    var HEADER_H = 64;
    var BLOCK_TITLE_H = 24;
    var THUMB = 100;
    var CELL_H = 118;
    var BLOCK_GAP = 12;
    var y = HEADER_H;
    grouped[perspectiveKey].blocks.forEach(function(block) {
      y += BLOCK_TITLE_H;
      var rows = Math.ceil(block.items.length / 2);
      y += rows * CELL_H + BLOCK_GAP;
    });
    return y + 16;
  }

  function fillPerspectiveHeader(ctx, short, official, centerX, topY, maxWidth) {
    ctx.textAlign = "center";
    ctx.font = "bold 13px sans-serif";
    if (!official) {
      ctx.fillText(short, centerX, topY + 8);
      return;
    }
    var officialText = "\uff08" + official + "\uff09";
    ctx.font = "10px sans-serif";
    var officialW = ctx.measureText(officialText).width;
    ctx.font = "bold 13px sans-serif";
    var shortW = ctx.measureText(short).width;
    if (shortW + officialW <= maxWidth) {
      var x = centerX - (shortW + officialW) / 2;
      ctx.textAlign = "left";
      ctx.fillText(short, x, topY + 8);
      ctx.font = "10px sans-serif";
      ctx.fillText(officialText, x + shortW, topY + 8);
      return;
    }
    ctx.textAlign = "center";
    ctx.font = "bold 13px sans-serif";
    ctx.fillText(short, centerX, topY);
    ctx.font = "10px sans-serif";
    ctx.fillText(officialText, centerX, topY + 14);
  }

  async function exportOverviewPng() {
    assertCanExport();
    var grouped = groupData(window.CAREER_DATA);
    var COL_W = 360;
    var GAP = 12;
    var PAD = 20;
    var HEADER_H = 64;
    var BLOCK_TITLE_H = 24;
    var THUMB = 100;
    var CELL_H = 118;
    var BLOCK_GAP = 12;
    var colors = ["#5b9bd5", "#70ad47", "#ffc000", "#ed7d31"];
    var heights = PERSPECTIVES.map(function(p) { return measureColumn(grouped, p.key); });
    var totalH = Math.max.apply(null, heights) + PAD * 2 + 60;
    var totalW = PAD * 2 + COL_W * 4 + GAP * 3;

    var canvas = document.createElement("canvas");
    canvas.width = totalW;
    canvas.height = totalH;
    var ctx = canvas.getContext("2d");
    ctx.fillStyle = "#eeeeee";
    ctx.fillRect(0, 0, totalW, totalH);

    ctx.fillStyle = "#333";
    ctx.font = "bold 22px " + FONT_FAMILY.replace(/"/g, "");
    ctx.textAlign = "center";
    ctx.fillText("\u30ad\u30e3\u30ea\u30a2\u6559\u80b2 \u5b66\u7fd2\u5185\u5bb9\u30a4\u30e9\u30b9\u30c8 \u4e00\u89a7\u8868\uff084\u8996\u70b9\uff09", totalW / 2, PAD + 18);

    for (var pi = 0; pi < PERSPECTIVES.length; pi++) {
      var p = PERSPECTIVES[pi];
      var x0 = PAD + pi * (COL_W + GAP);
      var y = PAD + 40;

      ctx.fillStyle = colors[pi];
      ctx.fillRect(x0, y, COL_W, HEADER_H);
      ctx.fillStyle = "#fff";
      fillPerspectiveHeader(ctx, p.short, p.official, x0 + COL_W / 2, y + 14, COL_W - 16);
      y += HEADER_H;

      ctx.fillStyle = "#fff";
      ctx.fillRect(x0, y, COL_W, heights[pi] - HEADER_H - 40);

      for (var bi = 0; bi < grouped[p.key].blocks.length; bi++) {
        var block = grouped[p.key].blocks[bi];
        ctx.fillStyle = "#f5f5f5";
        ctx.fillRect(x0 + 8, y + 4, COL_W - 16, BLOCK_TITLE_H);
        ctx.fillStyle = "#444";
        ctx.font = "bold 11px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("\u30d6\u30ed\u30c3\u30af" + block.blockId + "\u300c" + block.blockTitle + "\u300d", x0 + 14, y + 20);
        y += BLOCK_TITLE_H;

        for (var ii = 0; ii < block.items.length; ii++) {
          var item = block.items[ii];
          var col = ii % 2;
          var row = Math.floor(ii / 2);
          var cx = x0 + 10 + col * ((COL_W - 20) / 2);
          var cy = y + row * CELL_H;

          try {
            var img = await loadImage(careerImgSrc(item.file));
            ctx.drawImage(img, cx, cy, THUMB, THUMB);
          } catch (e) {
            ctx.fillStyle = "#e8e8e8";
            ctx.fillRect(cx, cy, THUMB, THUMB);
          }

          ctx.strokeStyle = "#ddd";
          ctx.strokeRect(cx, cy, THUMB, THUMB);
          ctx.fillStyle = "#333";
          ctx.font = "10px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(item.label, cx + THUMB / 2, cy + THUMB + 14);
        }
        var rows = Math.ceil(block.items.length / 2);
        y += rows * CELL_H + BLOCK_GAP;
      }
    }

    return new Promise(function(resolve, reject) {
      try {
        canvas.toBlob(function(blob) {
          if (!blob) {
            reject(new Error("serve.bat \u304b\u3089 http://localhost:8765/ \u3067\u958b\u304d\u76f4\u3057\u3066\u304f\u3060\u3055\u3044\u3002"));
            return;
          }
          downloadBlob(blob, "career_illust_overview.png").then(resolve).catch(reject);
        }, "image/png");
      } catch (e) {
        reject(new Error("PNG\u66f8\u304d\u51fa\u3057\u306b\u306f serve.bat \u304c\u5fc5\u8981\u3067\u3059\u3002"));
      }
    });
  }

  function applyLessonsData(data) {
    if (!data || !data.lessons) return null;
    data.lessons.forEach(function(lesson) {
      lessonsByRow[lesson.row] = lesson;
    });
    return data;
  }

  var JSON_SCRIPT_IDS = {
    data: "career-data-json",
    lessons: "career-lessons-json"
  };
  var JSON_PATHS = {
    data: "career-data.json",
    lessons: "career-lessons.json"
  };

  function parseJsonText(text) {
    if (!text || !String(text).trim()) return null;
    try {
      return JSON.parse(text);
    } catch (e) {
      return null;
    }
  }

  function loadJsonViaXhr(path) {
    if (!path) return null;
    try {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", path, false);
      xhr.overrideMimeType("application/json;charset=utf-8");
      xhr.send(null);
      if (xhr.responseText) {
        return parseJsonText(xhr.responseText);
      }
    } catch (e) {}
    return null;
  }

  function loadJsonViaFetch(path) {
    return fetch(path)
      .then(function(res) {
        if (!res.ok) throw new Error(path);
        return res.json();
      })
      .catch(function() {
        return null;
      });
  }

  function waitForJsonScript(id, path) {
    return new Promise(function(resolve) {
      var el = document.getElementById(id);
      function finish(data) {
        resolve(data || null);
      }
      function tryElement() {
        return parseJsonText(el && el.textContent);
      }
      if (el) {
        var immediate = tryElement();
        if (immediate) {
          finish(immediate);
          return;
        }
        el.addEventListener("load", function() {
          finish(tryElement() || loadJsonViaXhr(path));
        });
        el.addEventListener("error", function() {
          finish(loadJsonViaXhr(path));
        });
        setTimeout(function() {
          finish(tryElement() || loadJsonViaXhr(path));
        }, 120);
        return;
      }
      if (location.protocol === "file:") {
        finish(loadJsonViaXhr(path));
        return;
      }
      loadJsonViaFetch(path).then(finish);
    });
  }

  function loadJsonFromScript(id) {
    var el = document.getElementById(id);
    return parseJsonText(el && el.textContent);
  }

  function loadCareerData() {
    if (window.CAREER_DATA && window.CAREER_DATA.length) {
      return Promise.resolve(window.CAREER_DATA);
    }
    var inline = loadJsonFromScript(JSON_SCRIPT_IDS.data);
    if (Array.isArray(inline) && inline.length) {
      window.CAREER_DATA = inline;
      return Promise.resolve(inline);
    }
    return waitForJsonScript(JSON_SCRIPT_IDS.data, JSON_PATHS.data).then(function(data) {
      if (Array.isArray(data) && data.length) {
        window.CAREER_DATA = data;
        return data;
      }
      return null;
    });
  }

  function loadLessons() {
    if (window.CAREER_LESSONS) {
      return Promise.resolve(applyLessonsData(window.CAREER_LESSONS));
    }
    var inline = loadJsonFromScript(JSON_SCRIPT_IDS.lessons);
    if (inline) {
      return Promise.resolve(applyLessonsData(inline));
    }
    return waitForJsonScript(JSON_SCRIPT_IDS.lessons, JSON_PATHS.lessons).then(function(data) {
      return applyLessonsData(data);
    });
  }

  function initOverview() {
    Promise.all([loadCareerData(), loadLessons()]).then(function(results) {
      var data = results[0];
      if (!data || !data.length) {
        if (overviewEl) {
          overviewEl.innerHTML =
            "<p style=\"padding:16px;color:#c00;\">データが読み込めません。career-data.json と career-lessons.json を確認してください。</p>";
        }
        return;
      }
      buildOverview();
      updatePrintSelectionUI();
    });
  }

  initOverview();
})();
</script>
